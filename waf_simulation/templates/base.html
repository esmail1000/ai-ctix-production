<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Secure Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; background-color: #f4f6f8; color: #333; }
        .navbar { background-color: #1a237e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; margin-left: 1rem; font-weight: 500; }
        .navbar .brand { font-size: 1.5rem; font-weight: 700; color: white; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a237e; }
        .btn { background-color: #1a237e; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .btn:hover { background-color: #283593; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 0.8rem; margin: 0.5rem 0 1.5rem 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .form-group { margin-bottom: 1rem; }
        .alert { padding: 1rem; background-color: #fde0dc; color: #d32f2f; border-radius: 4px; border: 1px solid #f9bdbb; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand">Global Secure Bank</div>
        <div>
            <a href="/">Home</a>
            <a href="/search">Search Transactions</a>
            <a href="/transfer">Transfer Funds</a>
            <a href="/login">Login</a>
            <a href="/admin/reports" style="color: #ffb74d;">Admin Panel</a>
        </div>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
